# One-command local PACS test: Orthanc (with the DICOMweb plugin) + the
# OrbiDICOM viewer, wired together via the same-origin reverse proxy.
#
#   docker compose -f examples/docker-compose.yaml up --build
#
#   • Viewer:  http://localhost:8080   (enter a Study Instance UID, or drag files)
#   • Orthanc: http://localhost:8042   (upload DICOM here; DICOMweb at /dicom-web)
#
# DEV ONLY: Orthanc auth is disabled and the image is unpinned for convenience —
# pin a version and enable authentication before using this anywhere real.
services:
  orthanc:
    image: orthancteam/orthanc:latest
    ports:
      - "8042:8042"
    environment:
      ORTHANC__NAME: "OrbiDICOM Dev PACS"
      # Enable + mount the DICOMweb plugin at /dicom-web.
      DICOM_WEB_PLUGIN_ENABLED: "true"
      ORTHANC__DICOM_WEB__ROOT: "/dicom-web/"
      # Dev convenience — no auth, open remote access.
      ORTHANC__AUTHENTICATION_ENABLED: "false"
      ORTHANC__REMOTE_ACCESS_ALLOWED: "true"

  viewer:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Same-origin: the browser calls /dicom-web on the viewer, nginx forwards
      # to Orthanc — so no CORS setup is needed.
      ORBIDICOM_PACS_URL: "/dicom-web"
      ORBIDICOM_PACS_UPSTREAM: "http://orthanc:8042/dicom-web"
    depends_on:
      - orthanc
