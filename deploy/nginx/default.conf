# OrbiDICOM static SPA server (unprivileged nginx, listens on 8080).
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Reasonable upload ceiling for proxied STOW-RS, if ever used.
    client_max_body_size 0;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        text/css
        text/plain;

    # Never cache the entry document or the runtime config — a new deploy or a
    # changed PACS endpoint must take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /config.js {
        add_header Cache-Control "no-cache";
    }

    # Hash-named build assets are immutable; cache them hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Ensure WebAssembly is served with the correct type on any nginx build.
    location ~* \.wasm$ {
        types {
            application/wasm wasm;
        }
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Optional DICOMweb reverse proxy. The startup script writes pacs.conf here
    # (a `location /dicom-web/ { proxy_pass ...; }`) only when an upstream is set;
    # the glob matches nothing otherwise, so this is a no-op for local-only mode.
    include /etc/nginx/orbidicom.d/*.conf;

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
