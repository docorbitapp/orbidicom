apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orbidicom.fullname" . }}
  labels:
    {{- include "orbidicom.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "orbidicom.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "orbidicom.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pods when the PACS config changes so the new endpoint applies.
        checksum/config: {{ .Values.pacs | toYaml | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "orbidicom.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "orbidicom.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ORBIDICOM_PACS_URL
              value: {{ .Values.pacs.url | quote }}
            - name: ORBIDICOM_STUDY_UID
              value: {{ .Values.pacs.studyUid | quote }}
            {{- if .Values.pacs.proxy.enabled }}
            - name: ORBIDICOM_PACS_UPSTREAM
              value: {{ .Values.pacs.proxy.upstream | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
