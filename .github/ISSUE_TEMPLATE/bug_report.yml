name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Include steps, expected vs actual.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OrbiDICOM version
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Browser, OS, PACS (Orthanc/dcm4chee/…) or local mode.
