name: Publish container image

# Build and push the viewer image to GitHub Container Registry on version tags
# (e.g. v0.1.0), plus a manual trigger. Pull requests build only (no push) so the
# Dockerfile stays verified.
on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "deploy/**"
      - "apps/demo/**"
      - "packages/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip on pull_request — no registry write, just verify the build.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=pr
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # amd64-only: emulating arm64 under QEMU made this build extremely slow
          # (heavy Vite + Cornerstone WASM + pdf.js bundle). Add arm64 back via a
          # native runner or per-arch matrix if needed.
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
