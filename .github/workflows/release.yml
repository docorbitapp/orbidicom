name: Publish to npm

# Publishes @orbidicom/core, @orbidicom/vue, and the orbidicom CLI on a version tag
# (v*) or manual run. The three version in lockstep (changesets `fixed` group), so
# `npx orbidicom` never lags the library it bundles. `pnpm build` rebuilds the demo
# into the CLI's public/ before packing, so the CLI ships the just-built viewer.
#
# Auth: npm OIDC "trusted publishing" — no token. npm trusts this workflow via the
# trusted publisher configured on each package (GitHub Actions · docorbitapp/orbidicom
# · release.yml). NOTE: the `orbidicom` package needs its OWN trusted-publisher entry
# configured on npm (same as core/vue) or its publish step fails ENEEDAUTH.
# Two requirements the obvious `pnpm -r publish` doesn't meet:
#   1. OIDC publishing needs the npm CLI >= 11.5.1 (Node 20 ships npm 10; pnpm's
#      publish delegates to that npm and fails ENEEDAUTH) — so we upgrade npm and
#      publish with it directly.
#   2. npm can't read pnpm's `workspace:*` deps — so we `pnpm pack` first, which
#      rewrites them to real versions in the tarball, then `npm publish` the tarball.
# Provenance is intentionally off — it requires a public repo.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Pack (pnpm, rewrites workspace deps) + publish (npm, OIDC)
        run: |
          set -euo pipefail
          dest="$RUNNER_TEMP/tgz"
          mkdir -p "$dest"
          pnpm --filter "@orbidicom/core" pack --pack-destination "$dest"
          pnpm --filter "@orbidicom/vue" pack --pack-destination "$dest"
          pnpm --filter "orbidicom" pack --pack-destination "$dest"
          for tgz in "$dest"/*.tgz; do
            echo "::group::npm publish $(basename "$tgz")"
            npm publish "$tgz" --access public
            echo "::endgroup::"
          done
