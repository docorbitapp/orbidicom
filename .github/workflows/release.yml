name: Publish to npm

# Publishes the public packages (@orbidicom/core, @orbidicom/vue, orbidicom) to
# the npm registry on a version tag (e.g. v0.2.1) or a manual run. Private
# packages (@orbidicom/demo, create-orbidicom) are skipped, and already-published
# versions (e.g. the unchanged CLI) are skipped automatically by `pnpm -r publish`.
#
# Auth: npm OIDC "trusted publishing" — no token. npm trusts this workflow via the
# trusted publisher configured on each package (GitHub Actions · docorbitapp/orbidicom
# · release.yml). Needs pnpm >= 10.12 (does the OIDC token exchange) and id-token: write.
# Provenance is intentionally NOT enabled — it requires a public repo.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - run: pnpm -r publish --access public --no-git-checks
