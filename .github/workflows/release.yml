name: Publish to npm

# Publishes the public packages (@orbidicom/core, @orbidicom/vue, orbidicom) to
# the npm registry on a version tag (e.g. v0.2.1) or a manual run. Private
# packages (@orbidicom/demo, create-orbidicom) are skipped by `pnpm -r publish`.
#
# Auth: an NPM_TOKEN repo secret (an npm "Automation" token for an account that
# owns the `orbidicom` name and the `@orbidicom` scope). OIDC trusted publishing
# was attempted but `pnpm publish` does not perform npm's OIDC token exchange, so
# a token is required (pnpm is needed to rewrite the workspace:* deps).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          # Writes ~/.npmrc with the registry + _authToken from NODE_AUTH_TOKEN.
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Publishes every non-private workspace package whose version is not yet on
      # the registry. workspace:* deps are rewritten to real versions by pnpm.
      - run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
